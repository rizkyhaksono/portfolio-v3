version = 1

test_patterns = [
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.spec.ts",
  "**/*.spec.tsx",
  "**/__tests__/**",
  "**/__mocks__/**",
]

exclude_patterns = [
  "node_modules/**",
  ".next/**",
  "out/**",
  "coverage/**",
  "public/**",
  "content/**",
  "docs/**",
  "**/*.d.ts",
]

[[analyzers]]
name = "javascript"
enabled = true

  [analyzers.meta]
  plugins = ["react"]
  environment = ["nodejs", "browser"]
  dialect = "typescript"
  module_system = "es-modules"
  # Match existing DeepSource dashboard setting used on main.
  skip_doc_coverage = ["arrow-function-expression"]
